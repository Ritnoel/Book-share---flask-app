{% extends 'layout.html' %}
{% block content %}

    <h2>Put in your verification code</h2>

     <form method="POST" novalidate action="{{url_for('submit_verification')}}" enctype="multipart/form-data">
        {{ form.hidden_tag() }}

        {% for error in form.enter_code.errors %}
            <span style="color:red;">{{error}}</span>
        {% endfor %}
        {{ form.enter_code() }}

        <button type="submit">Submit</button>

    </form>


{% endblock %}
