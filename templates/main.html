{% extends 'layout.html' %}
{% block content %}

    <div class="nav_buttons">
        <a href="{{ url_for('main')}}" class="btn">Home</a>
        <a href="{{ url_for('user_profile')}}" class="btn">Profile</a>
        <a href="{{ url_for('logout')}}" class="btn">Logout</a>
    </div>


    <h2>Books for Borrowing</h2>

    {% for book in books %}
        <div class="tool-container">

            <p>{{book.title}}</p>

            <div class="book-row">
                <p><img src="{{ url_for('static', filename='images/' + book.book_photo) }}" width="100", height="100"></p>

                <a href="{{ url_for('show_request_book', book_id=book.id)}}" class="btn">Request for borrowing</a>
            </div>  
            
        </div>
    {% endfor %}


{% endblock %}
