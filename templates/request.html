{% extends 'layout.html' %}
{% block content %}

    <h2>Create a new account</h2>

    <p>Book ID: {{ book.id }}</p>

     <form method="POST" novalidate action="{{url_for('submit_request_book', book_id=book.id)}}" enctype="multipart/form-data">
        {{ form.hidden_tag() }}
        
        <h3>{{ book.title }}</h3>
        <img src="{{ url_for('static', filename='images/' + book.book_photo) }}" width="100" height="100">
        
        {% for error in form.date_requested.errors %}
            <span style="color:red;">{{error}}</span>
        {% endfor %}
        {{ form.date_requested() }}

        <button type="submit">Submit</button>

    </form>


{% endblock %}
