{% extends 'layout.html' %}
{% block content %}

    <p>Don't have an account? <a href="{{ url_for('show_create_account_form') }}">Register here</a></p>

    <h2>Login</h2>


    <form method="POST" novalidate action="{{url_for('submit_login_form')}}">
        {{ form.hidden_tag() }}

        {% for error in form.phone_number.errors %}
            <span style="color:red;">{{error}}</span>
        {% endfor %}
        {{ form.phone_number() }}

        <button type="submit">Request Code</button>

    </form>


{% endblock %}
